services:
  - type: web
    name: klelite-backend
    runtime: node
    rootDir: backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run seed:if-empty && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MOMO_PARTNER_CODE
        sync: false
      - key: MOMO_ACCESS_KEY
        sync: false
      - key: MOMO_SECRET_KEY
        sync: false
      - key: MOMO_ENDPOINT
        value: https://payment.momo.vn/v2/gateway/api/create
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
